name: build AND docker latest push

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: ./mvnw clean package -Dmaven.test.skip=true
      -
        name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Inspect builder
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"


      - name: Build dockerfile (with not push)
        run: |
          ./buildx.sh --push false --repo ${{ secrets.DOCKER_USERNAME }} --image-name distops
      -
        name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build dockerfile (with push)
        run: |
          ./buildx.sh --push true --repo ${{ secrets.DOCKER_USERNAME }} --image-name distops