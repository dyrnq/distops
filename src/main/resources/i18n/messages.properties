desc.route = Route \u4e5f\u79f0\u4e4b\u4e3a\u8def\u7531\uff0c\u53ef\u4ee5\u901a\u8fc7\u5b9a\u4e49\u4e00\u4e9b\u89c4\u5219\u6765\u5339\u914d\u5ba2\u6237\u7aef\u7684\u8bf7\u6c42\uff0c\u7136\u540e\u6839\u636e\u5339\u914d\u7ed3\u679c\u52a0\u8f7d\u5e76\u6267\u884c\u76f8\u5e94\u7684\u63d2\u4ef6\uff0c\u5e76\u628a\u8bf7\u6c42\u8f6c\u53d1\u7ed9\u5230\u6307\u5b9a Upstream\uff08\u4e0a\u6e38\uff09\u3002
desc.service = Service \u662f\u67d0\u7c7b API \u7684\u62bd\u8c61\uff08\u4e5f\u53ef\u4ee5\u7406\u89e3\u4e3a\u4e00\u7ec4 Route \u7684\u62bd\u8c61\uff09\u3002\u5b83\u901a\u5e38\u4e0e\u4e0a\u6e38\u670d\u52a1\u62bd\u8c61\u662f\u4e00\u4e00\u5bf9\u5e94\u7684\uff0cRoute \u4e0e Service \u4e4b\u95f4\uff0c\u901a\u5e38\u662f N:1 \u7684\u5173\u7cfb\u3002
desc.consumer = Consumer \u662f\u67d0\u7c7b\u670d\u52a1\u7684\u6d88\u8d39\u8005\uff0c\u9700\u8981\u4e0e\u7528\u6237\u8ba4\u8bc1\u4f53\u7cfb\u914d\u5408\u624d\u80fd\u4f7f\u7528\u3002Consumer \u4f7f\u7528 username \u4f5c\u4e3a\u552f\u4e00\u6807\u8bc6\uff0c\u4ec5\u652f\u6301\u4f7f\u7528 HTTP PUT \u65b9\u6cd5\u521b\u5efa Consumer\u3002
desc.upstream = Upstream \u662f\u865a\u62df\u4e3b\u673a\u62bd\u8c61\uff0c\u5bf9\u7ed9\u5b9a\u7684\u591a\u4e2a\u670d\u52a1\u8282\u70b9\u6309\u7167\u914d\u7f6e\u89c4\u5219\u8fdb\u884c\u8d1f\u8f7d\u5747\u8861\u3002Upstream \u7684\u5730\u5740\u4fe1\u606f\u53ef\u4ee5\u76f4\u63a5\u914d\u7f6e\u5230 Route\uff08\u6216 Service) \u4e0a\uff0c\u5f53 Upstream \u6709\u91cd\u590d\u65f6\uff0c\u9700\u8981\u7528\u201c\u5f15\u7528\u201d\u65b9\u5f0f\u907f\u514d\u91cd\u590d\u3002
desc.ssl = \u4f60\u53ef\u4ee5\u4f7f\u7528\u8be5\u8d44\u6e90\u521b\u5efa SSL \u8bc1\u4e66\u3002
desc.globalRule = Global Rule \u53ef\u4ee5\u8bbe\u7f6e\u5168\u5c40\u8fd0\u884c\u7684\u63d2\u4ef6\uff0c\u8bbe\u7f6e\u4e3a\u5168\u5c40\u89c4\u5219\u7684\u63d2\u4ef6\u5c06\u5728\u6240\u6709\u8def\u7531\u7ea7\u522b\u7684\u63d2\u4ef6\u4e4b\u524d\u4f18\u5148\u8fd0\u884c\u3002
