desc.pluginConfig = \u4f60\u53ef\u4ee5\u4f7f\u7528 Plugin Config \u8d44\u6e90\u521b\u5efa\u4e00\u7ec4\u53ef\u4ee5\u5728\u8def\u7531\u95f4\u590d\u7528\u7684\u63d2\u4ef6\u3002
