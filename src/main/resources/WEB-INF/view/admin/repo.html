<!DOCTYPE HTML>
<html>
<head>
<#include "common.html"/>
<style type="text/css">

.long{
    width: 210px;
}

.short{
    width: 110px!important;
}

input[name='param']{
    width: 100px;
}
</style>
</head>
<body class="layui-layout-body">
<div class="layui-layout layui-layout-admin">

<#include "header.html"/>
<#include "menu.html"/>

    <div class="layui-body">


        <!-- 内容主体区域 -->
        <div style="padding: 15px">
            <fieldset class="layui-elem-field layui-field-title">
                <legend>${i18n.get("menu.repo")}</legend>
            </fieldset>

            <form class="layui-form" id="searchForm" method="post">
                <div class="layui-form">

                    <div class="layui-col-md2"><div class="grid-demo">
                        <div class="layui-input-group">
                            <div class="layui-input-split layui-input-prefix">repoName</div>
                            <input type="text" name="repoName" class="layui-input">
                        </div>
                    </div></div>

                    <div class="layui-col-md2"><div class="grid-demo">
                        <div class="layui-input-group">
                            <div class="layui-input-split layui-input-prefix">instName</div>
                            <input type="text" name="instName" class="layui-input">
                        </div>
                    </div></div>

                    <hr class="layui-border-orange" style="border-color:rgba(255, 183, 0, 0)  !important">

                    <div class="layui-col-md2" style="margin-top:10px;margin-bottom:10px;"><div class="grid-demo">
                        <div class="layui-btn-container layui-col-xs12">

                            <button class="layui-btn layui-btn-sm" lay-submit lay-filter="demo-table-search">${i18n.get("commonStr.search")}</button>
                            <button class="layui-btn layui-btn-sm layui-btn-primary" type="reset" >${i18n.get("commonStr.clear")}</button>
                        </div>
                    </div></div>

                </div>
            </form>

            <table class="layui-hide" id="demo" lay-filter="test"></table>


        </div>
    </div>
</div>


<div style="height: 500px; width: 300px; overflow: hidden;">
    <!-- 弹出框 -->
    <div class="layui-form" id="windowDiv" style="padding: 15px; display: none">
        <form id="addForm1">
            <input type="hidden" name="u">

            <div class="layui-form-item" id="div_id" style="display: none">
                <label class="layui-form-label">id</label>
                <div class="layui-input-block">
                    <input type="text" name="id" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">repo_name</label>
                <div class="layui-input-block">
                    <input type="text" name="repoName" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">media_type</label>
                <div class="layui-input-block">
                    <input type="text" name="mediaType" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">is_manifest_list</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="isManifestList" title="ON|OFF" lay-skin="switch" value="1" checked lay-filter="demo-checkbox-filter">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">tag_count</label>
                <div class="layui-input-block">
                    <input type="text" name="tagCount" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item center">
                <button type="button" class="layui-btn layui-btn-normal" id="addOver">${i18n.get("commonStr.submit")}</button>
                <button type="button" class="layui-btn" onclick="layer.closeAll()">${i18n.get("commonStr.close")}</button>
            </div>
        </form>
    </div>
</div>

<#include "script.html"/>
<script type="text/html" id="toolbarDemo">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-sm layui-btn-normal" lay-event="add"><i class="layui-icon  layui-icon-add-1"></i></button>
        <button class="layui-btn layui-btn-sm" lay-event="more">${i18n.get("commonStr.batch")}<i class="layui-icon layui-icon-down layui-font-12"></i></button>
        <button class="layui-btn layui-btn-sm" lay-event="deleteSelected" style="display: none"><i class="layui-icon  layui-icon-delete"></i></button>
    </div>
</script>

<script src="${ctx}/lib/base64/base64.js" type="text/javascript"></script>
<script src="${ctx}/js/admin/repo/index.js?v=${jsrandom}" type="text/javascript"></script>
</body>
</html>
