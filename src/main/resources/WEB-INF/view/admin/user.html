<!DOCTYPE HTML>

<head>

<body class="layui-layout-body">
<div class="layui-layout layui-layout-admin">

<#include "header.html"/>
<#include "menu.html"/>

    <div class="layui-body">



        <!-- 内容主体区域 -->
        <div style="padding: 15px">
            <fieldset class="layui-elem-field layui-field-title">
                <legend>${i18n.get("menu.user")}</legend>
            </fieldset>

            <form action="${ctx}/admin/http" id="searchForm" method="post">
                <div class="layui-form">
                    <div class="layui-inline" style="display: none">
                        <button type="button" class="layui-btn layui-btn-sm layui-btn-normal" id="add">${i18n.get("add.user")}</button>
                    </div>
                    <div class="layui-inline" style="display: none">
                        <button type="button" class="layui-btn layui-btn-sm" id="guide">${i18n.get("commonStr.edit")}</button>
                    </div>
                    <div class="layui-inline" style="display: none">
                        <button type="button" class="layui-btn layui-btn-sm">${i18n.get("commonStr.edit")}</button>
                    </div>
                    <div class="layui-inline" style="display: none">
                        <button type="button" class="layui-btn layui-btn-sm layui-btn-normal">${i18n.get("commonStr.clear")}</button>
                    </div>
                </div>
            </form>

            <table class="layui-hide" id="demo" lay-filter="test"></table>


        </div>
    </div>
</div>

<div style="height: 500px; width: 300px; overflow: hidden;">
    <!-- 弹出框 -->
    <div class="layui-form" id="windowDiv" style="padding: 15px; display: none">
        <form id="addForm1">
            <input type="hidden" name="u">


            <div class="layui-form-item" id="div_id">
                <label class="layui-form-label">id</label>
                <div class="layui-input-block">
                    <input type="text" name="id" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">name</label>
                <div class="layui-input-block">
                    <input type="text" name="name" class="layui-input" >
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">email</label>
                <div class="layui-input-block">
                    <input type="text" name="email" class="layui-input" >
                </div>
            </div>


            <div class="layui-form-item">
                <label class="layui-form-label">phone</label>
                <div class="layui-input-block">
                    <input type="text" name="phone" class="layui-input" >
                </div>
            </div>


            <div class="layui-form-item" id="div_pass">
                <label class="layui-form-label">pass</label>
                <div class="layui-input-block">
                    <input type="password" name="pass" id="pass" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item center">
                <button type="button" class="layui-btn layui-btn-normal" id="addOver">${i18n.get("commonStr.submit")}</button>
                <button type="button" class="layui-btn" onclick="layer.closeAll()">${i18n.get("commonStr.close")}</button>
            </div>
        </form>
    </div>

    <div class="layui-form" id="changeDiv" style="padding: 15px; display: none">
        <form id="addForm2">
            <input type="hidden" name="id">


            <div class="layui-row">
                <div class="layui-col-md10"><div class="grid-demo">
                    <div class="layui-form-item">
                    <div class="layui-input-group">
                        <div class="layui-input-split layui-input-prefix">${i18n.get("loginStr.pass")}</div>
                        <input type="password" name="newPass" id="newPass" class="layui-input" lay-affix="eye">
                    </div>

<!--                    </div>-->

                </div></div>

<!--                <div class="layui-col-md2"><div class="grid-demo">-->
<!--                    &nbsp;&nbsp;-->
<!--                </div></div>-->
            </div>


            <div class="layui-row">
                <div class="layui-col-md10"><div class="grid-demo">
                    <div class="layui-form-item">
                    <div class="layui-input-group">
                        <div class="layui-input-split layui-input-prefix">${i18n.get("loginStr.repeatPass")}</div>
                        <input type="password" name="confirmPass" id="confirmPass" class="layui-input" lay-affix="eye">

            <div class="layui-form-item center">
                <button type="button" class="layui-btn layui-btn-normal" id="change">${i18n.get("commonStr.submit")}</button>
                <button type="button" class="layui-btn" onclick="layer.closeAll()">${i18n.get("commonStr.close")}</button>
            </div>
        </form>
    </div>

</div>

<#include "script.html"/>
<script type="text/html" id="toolbarDemo">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-sm layui-btn-normal" lay-event="add"><i class="layui-icon  layui-icon-add-1"></i></button>
        <button class="layui-btn layui-btn-sm" lay-event="deleteSelected"><i class="layui-icon  layui-icon-delete"></i></button>
        <button class="layui-btn layui-btn-sm" lay-event="getCheckData" style="display: none">获取选中行数据</button>
    </div>
</script>
<script src="${ctx}/lib/base64/base64.js" type="text/javascript"></script>
<script src="${ctx}/js/admin/user/index.js?v=${jsrandom}" type="text/javascript"></script>
